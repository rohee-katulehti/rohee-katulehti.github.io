{{ if hugo.Data.homepage.about2.enable }}
<section class="section rad-animation-group pb-0" id="{{ hugo.Data.homepage.about2.id }}">
  <div class="container rad-fade-down">
    <div class="row d-flex flex-md-row">
      <div class="col-12 col-md-6">
        <h2>{{ hugo.Data.homepage.about2.title }}</h2>
        <p class="lead">
          {{ hugo.Data.homepage.about2.content | safeHTML }}
        </p>
        <p>
          <a
          href="{{ hugo.Data.homepage.about2.button.URL }}"
          class="contact-btn"
        >
          <i class="{{ hugo.Data.homepage.about2.button.icon }}"></i>
          {{ hugo.Data.homepage.about2.button.btnText }}
        </a>
      </p>
    </div>
      <div class="about__profile-picture" style="display: flex; max-height: 500px; flex: 1; width: 100%; padding: 0 12px;">
        <img
          style="width: 100%; object-fit: cover;"
          class="lozad img-responsive section-img"
          src="data:image/gif;base64,R0lGODlhBwACAIAAAP///wAAACH5BAEAAAEALAAAAAAHAAIAAAIDjI9YADs="
          data-src="{{ hugo.Data.homepage.about2.image.x | relURL }}"
          data-srcset="{{ hugo.Data.homepage.about2.image.x | relURL }} 1x, {{ hugo.Data.homepage.about2.image._2x | relURL }} 2x"
          alt="{{ hugo.Data.homepage.about2.image.alt }}"
        />
      </div>

    </div>
  </div>
  {{ if hugo.Data.homepage.about2.nextId }}
    <div id="{{ hugo.Data.homepage.about2.nextId }}"></div>
  {{ end }}
</section>
{{ end }}
