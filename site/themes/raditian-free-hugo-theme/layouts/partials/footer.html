<footer class="footer">
  <div class="container">
    <div class="footer__left">
      <div class="footer__copy">
        {{ site.Params.footer.copyright }}
      </div>
    </div>
    <div class="footer__links">
      <ul class="navbar-nav ">
        <li class="nav-item">
          <a class="nav-link" href="/">{{.Title | upper}}</a>
        </li>
        {{ range site.Menus.footer }}
        <li class="nav-item">
          <a class="nav-link" href="{{ .URL }}">{{ .Name | upper }}</a>
        </li>
        {{ end }}

        <li class="nav-item">
          <div class="row platform-links">
            <div class="col-12">
              {{ range hugo.Data.homepage.home.socialLinks }}
              <a class="some-icon-footer" href="{{ .URL | relURL }}" target="_blank" rel="noopener noreferrer"
                ><i class="icon-{{ .icon }}-line"></i
              ></a>
              {{ end }}
            </div>
          </div>
        </li>

      </ul>
    </div>
    <div class="footer__right">
      <!--<a href="https://radity.com/"
        ><img
          src="{{ site.Params.footer.radity_logo.x | relURL }}"
          srcset="{{ site.Params.footer.radity_logo.x | relURL }} 1x, {{ site.Params.footer.radity_logo._2x | relURL }} 2x"
          alt="{{ site.Params.footer.radity_logo.alt }}"
      /></a>-->
    </div>
  </div>
</footer>
