home:
  enable: true
  title: "Rohee – rouhea ja rohkea pirkanmaalainen katulehti"
  description: '<p class="lead">Rohee on paikallinen katulehti Pirkanmaalla. Katulehteä saa myydä kuka tahansa tuloja tarvitseva. Lehden suositushinta vaihtelee tuotteen mukaan 5–20 euroa, myyjä on ostanut lehden/kirjan etukäteen puolella hinnalla suositushinnasta ja saa myyntivoiton tuloa.</p><p class="lead">Lehti on innostava ja kiinnostava aikakauslehti täynnä kulttuuria, kokemuksia kaduilta ja yhteiskunnallisia huomioita.</p>'
